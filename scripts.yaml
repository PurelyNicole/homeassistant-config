      entity_id: group.anyone_asleep
      state:
      - 'off'
    then:
    - action: fan.turn_off
      continue_on_error: true
      metadata: {}
      data: {}
      target:
        entity_id:
        - fan.snooz_c0_49_ef_27_a8_62
