blue_air_fan_control:
  sequence:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: or
          conditions:
          - condition: state
            entity_id: climate.ecobee_thermostat
            attribute: hvac_action
            state: cooling
          - condition: state
            entity_id: climate.ecobee_thermostat
            attribute: hvac_action
            state: heating
          alias: If Ecobee is Heating or Cooling
        - condition: not
          conditions:
          - condition: state
            entity_id: input_select.home_mode
            state: Sleep
          - condition: state
            entity_id: input_select.home_mode
            state: Away
          alias: If Home Mode is not Sleep or Away
        alias: If Ecobee is heating/cooling while we're home
      sequence:
      - action: fan.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: fan.blue_air_fan
    - conditions:
      - condition: state
        entity_id: climate.ecobee_thermostat
        attribute: hvac_action
        state: idle
      sequence:
      - action: fan.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: fan.blue_air_fan
