        metadata: {}
        data: {}
        target:
          entity_id: climate.workshop_hvac
    - conditions:
      - condition: state
        entity_id: schedule.dte_peak_hours
        state: 'off'
      sequence:
      - if:
        - condition: state
          entity_id: binary_sensor.windows
          state: 'off'
        then:
        - alias: If not on vacation...
          if:
          - condition: state
            entity_id: input_boolean.vacation_mode
            state: 'off'
          then:
