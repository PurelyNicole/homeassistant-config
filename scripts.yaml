wind_down_nicole:
  alias: Wind Down - Nicole
  sequence:
  - action: input_select.select_option
    continue_on_error: true
    metadata: {}
    data:
      option: Wind Down
    target:
      entity_id: input_select.home_mode
  - action: light.turn_on
    continue_on_error: true
    metadata: {}
    data:
      brightness: 26
    target:
      entity_id: light.master_bath_light
    alias: Turn on and dim master bathroom light
  - action: light.turn_off
    continue_on_error: true
    metadata: {}
    data: {}
    target:
      entity_id:
      - light.nightstand_lamps
      - light.master_bedroom_closet
      - light.master_bedroom_light
  - action: light.turn_on
    continue_on_error: true
    metadata: {}
    data:
      brightness_pct: 38
    target:
      entity_id: light.nightstand_lamps
  - action: fan.turn_on
    continue_on_error: true
    metadata: {}
    data: {}
    target:
      entity_id: fan.master_bedroom_fan
  - if:
    - condition: state
      entity_id: input_boolean.hvac_override
      state: 'off'
    then:
    - action: climate.set_preset_mode
      continue_on_error: true
      metadata: {}
      data:
        preset_mode: sleep
      target:
        entity_id: climate.ecobee_thermostat
  - if:
    - condition: template
      value_template: '{{states(''sensor.bedjet_12fa_ambient_temperature'') | int
        <= 66}}'
      alias: BedJet Ambient Temperature is less than or equal to 65
    then:
    - delay:
        hours: 0
        minutes: 30
        seconds: 0
        milliseconds: 0
    - action: climate.set_hvac_mode
      metadata: {}
      data:
        hvac_mode: heat
      target:
        entity_id: climate.bedjet_12fa
  description: ''
  icon: mdi:alarm-snooze
goodnight:
  alias: Goodnight
  sequence:
  - action: input_select.select_option
