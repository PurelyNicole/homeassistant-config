- id: home_mode_away
  alias: Home Mode - Set away when everyone leaves
  description: ''
  triggers:
  - entity_id: group.people
    from: home
    to: not_home
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: state
    alias: When everyone is away for more than five minutes
  conditions:
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - action: script.goodbye
    metadata: {}
    data: {}
  mode: parallel
  max: 10
- id: welcome_home
  alias: Welcome Home
  description: ''
  triggers:
  - entity_id: group.people
    to: home
    trigger: state
  - entity_id: person.eric
    to: home
    trigger: state
  - entity_id: person.nicole
    to: home
    trigger: state
  conditions: []
  actions:
  - action: lock.unlock
    metadata: {}
    data: {}
    target:
      entity_id: lock.kitchen_door_lock
  - alias: If not asleep, turn on mirror
    if:
    - condition: not
      conditions:
      - condition: state
        entity_id: input_select.home_mode
        state: Sleep
      alias: Mode is not Sleep
    then:
    - data:
        option: Home
      target:
        entity_id: input_select.home_mode
      action: input_select.select_option
      alias: Set mode to home
    - data: {}
      target:
        entity_id:
        - switch.nicole_desk
        - switch.klipsch_speakers
        - switch.eric_desk
      action: switch.turn_on
  - if:
    - alias: If it's dark outside
      condition: or
      conditions:
      - condition: sun
        after: sunset
        after_offset: '-1:00'
        before: sunrise
      - condition: state
        entity_id: binary_sensor.pixel_post_light_on
        state: 'on'
    then:
    - action: light.turn_on
      metadata: {}
      data: {}
      target:
        entity_id:
        - light.kitchen_table_light
        - light.kitchen_mudroom_dimmer
        - light.dining_room_table_dimmer
    alias: If dark, turn on lights
  - alias: If not working, turn on media center
    if:
    - condition: or
      conditions:
      - condition: state
        entity_id: binary_sensor.nicole_workday_sensor
        state: 'off'
      - condition: time
        after: '15:00:00'
    then:
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id:
        - switch.main_floor_media_center_plug
        - switch.family_room_media_center_top
  mode: parallel
  max: 10
- id: goodnight_2am
  alias: Scene - Goodnight at 2:00am
  description: ''
  triggers:
  - at: 02:00:00
    trigger: time
  conditions:
  - condition: state
    entity_id: group.people
    state: home
    alias: Someone is home
  actions:
  - action: script.goodnight
    metadata: {}
    data: {}
    enabled: false
  - action: input_select.select_option
    metadata: {}
    data:
      option: Sleep
    target:
      entity_id: input_select.home_mode
  mode: single
- id: watch_tv_after_sunset
  alias: Scene - Trigger watch TV when Remote goes from PowerOff after sunset
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - media_player.downstairs_musiccast
    to: playing
  conditions:
  - condition: time
    after: '19:00:00'
  actions:
  - action: script.watch_tv_downstairs
    metadata: {}
    data: {}
  - if:
    - condition: state
      entity_id: binary_sensor.kitchen_motion_sensor_group
      state: 'off'
      for:
        hours: 0
        minutes: 1
        seconds: 0
    then:
    - action: script.watch_tv_main_floor
      metadata: {}
      data: {}
  mode: single
- id: basement_lights_single_switch
  alias: Basement - Control lights with single switch
  description: ''
  triggers:
  - trigger: state
