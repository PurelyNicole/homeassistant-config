- id: lights_on_post_light
  alias: Outdoor Lights - Control lights with Pixel Post
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.pixel_post_light_on
    to: 'on'
    from: 'off'
  - trigger: state
    entity_id:
    - binary_sensor.pixel_post_light_on
    to: 'off'
    from: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 30
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.home_mode
      state: Sleep
    - condition: state
      entity_id: input_select.home_mode
      state: Wind Down
  actions:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: state
          entity_id: binary_sensor.pixel_post_light_on
          state: 'on'
      sequence:
      - data: {}
        action: light.turn_on
        target:
          entity_id:
          - light.outdoor_garage_lights
          - light.garage_flood_lights_west
          - light.service_door_light
          - light.porch_light
          - light.outside_workshop_light
          - light.driveway_post_and_tree_lights
          - light.family_room_deck_light_side
          - light.family_room_deck_light_back
      - action: script.holiday_lighting
        metadata: {}
        data: {}
      - if:
        - condition: state
          entity_id: remote.family_room_remote
          state: 'off'
        then:
        - action: light.turn_on
          metadata: {}
          data: {}
          target:
            entity_id:
            - light.grill_lights
      alias: If Pixel Post is on and mode is not Sleep
    - conditions:
      - condition: state
        entity_id: binary_sensor.pixel_post_light_on
        state: 'off'
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          area_id: outdoors
      - action: switch.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: switch.wled_lights
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 0
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: light.pixel_post_light
  mode: single
