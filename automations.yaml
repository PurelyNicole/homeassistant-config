  - condition: state
    entity_id: schedule.dte_peak_hours
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{states(''sensor.workshop_hvac_indoor_temperature'')|int
          > 50 }}'
        alias: Workshop temperature is greater than 50
      sequence:
      - action: climate.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: climate.workshop_hvac
      alias: Turn off if temperature is greater than 50
    - conditions:
      - condition: and
        conditions:
        - alias: Workshop temperature is less than 40
          condition: template
          value_template: '{{states(''sensor.workshop_hvac_indoor_temperature'')|int
            < 41 }}'
      sequence:
      - action: climate.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: climate.workshop_hvac
      - alias: Heat workshop to 60
        action: climate.set_temperature
        metadata: {}
        target:
          entity_id: climate.workshop_hvac
        data:
          temperature: 61
          hvac_mode: heat
      alias: Turn on heat if workshop temperature under 40
    - conditions:
      - alias: Workshop Humidity is greater than 60
        condition: template
        value_template: '{{states(''sensor.workshop_sensor_humidity'')|int > 60 }}'
      sequence:
      - action: climate.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: climate.workshop_hvac
      - if:
        - condition: template
          value_template: '{{states(''sensor.workshop_hvac_outdoor_temperature'')|int
            < 50 }}'
          alias: Outdoor Temperature is less than 60
        then:
        - alias: Set thermostat to heat to 60
          action: climate.set_temperature
          metadata: {}
          target:
            entity_id: climate.workshop_hvac
          data:
            temperature: 61
            hvac_mode: heat
        else:
        - action: climate.set_temperature
          metadata: {}
          target:
            entity_id: climate.workshop_hvac
          data:
            temperature: 70
            hvac_mode: cool
          alias: Set thermostat to cool to 70
    - conditions:
      - alias: Workshop Humidity is less than 50 and temperature is greater than 50
        condition: template
        value_template: '{{(states(''sensor.workshop_sensor_humidity'')|int < 50)
          and (states(''sensor.workshop_hvac_indoor_temperature'')|int > 50)}}'
      sequence:
      - action: climate.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: climate.workshop_hvac
  mode: single
