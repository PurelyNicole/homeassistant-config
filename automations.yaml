- id: '1760379968890'
  alias: Plant Lights
  description: ''
  triggers:
  - trigger: sun
    event: sunrise
    id: sunrise
  - trigger: sun
    event: sunset
    offset: 0
    id: sunset
  - trigger: state
    entity_id:
    - group.anyone_asleep
    to:
    - 'off'
    id: anyone_asleep_off
  conditions:
  - condition: state
    entity_id: group.anyone_asleep
    state:
    - 'off'
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: trigger
            id:
            - sunrise
          - condition: state
            entity_id: group.anyone_asleep
            state:
            - 'off'
          alias: The sun rises and no one is asleep
        - condition: and
          conditions:
          - condition: trigger
            id:
            - anyone_asleep_off
          - condition: state
            entity_id: sun.sun
            state:
            - above_horizon
          alias: Last person wakes up and it's past sunrise
      sequence:
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: light.plant_lights
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.seed_starter_light
        data: {}
    - conditions:
      - condition: trigger
        id:
        - sunset
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.plant_lights
      - action: light.turn_off
        metadata: {}
        target:
          entity_id: light.seed_starter_light
        data: {}
  mode: single
