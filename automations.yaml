- id: kitchen_window_seat_light
  alias: Kitchen - Control lights with overhead switch
  description: ''
  triggers:
  - entity_id:
    - light.kitchen_overhead_lights
    to: 'on'
    from: 'off'
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 0
  - entity_id:
    - light.kitchen_overhead_lights
    to: 'off'
    from: 'on'
    trigger: state
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.home_mode
      state: Sleep
    - condition: state
      entity_id: input_select.home_mode
      state: Away
    - condition: state
      entity_id: input_select.home_mode
      state:
      - Wind Up
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.kitchen_overhead_lights
        state: 'on'
      sequence:
      - data: {}
        target:
          entity_id:
          - light.kitchen_mudroom_dimmer
          - light.kitchen_sink_dimmer
          - light.kitchen_table_light
          - light.kitchen_under_cabinet_lights
          - light.kitchen_window_seat_light
        action: light.turn_on
    - conditions:
      - condition: state
        entity_id: light.kitchen_overhead_lights
        state: 'off'
      sequence:
      - data: {}
        target:
          area_id: kitchen
        action: light.turn_off
  mode: queued
  max: 5
