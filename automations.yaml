  alias: Set Bedjet
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - fan.bedjet_12fa
    to: 'on'
  conditions: []
  actions:
  - choose:
    - conditions:
      - alias: Ambient Temperature is 70 or greater
        condition: template
        value_template: '{{states(''sensor.bedjet_12fa_ambient_temperature'') | int
          >= 70}}'
      sequence:
      - action: climate.set_hvac_mode
        metadata: {}
        data:
          hvac_mode: cool
        target:
          entity_id: climate.bedjet_12fa
        alias: Turn on BedJet cool
      - alias: Set BedJet to run for 6 hours
        action: number.set_value
        metadata: {}
        data:
          value: '360'
        target:
          entity_id: number.bedjet_12fa_runtime_remaining
    - conditions:
      - alias: Ambient Temperature is less than 70 and greater than 65
        condition: template
        value_template: '{{states(''sensor.bedjet_12fa_ambient_temperature'') | int
          < 70 and states(''sensor.bedjet_12fa_ambient_temperature'') | int > 65}}'
      sequence:
      - action: climate.set_hvac_mode
        metadata: {}
        data:
          hvac_mode: cool
        target:
          entity_id: climate.bedjet_12fa
        alias: Turn on BedJet cool
      - action: number.set_value
        metadata: {}
        data:
          value: '120'
        target:
          entity_id: number.bedjet_12fa_runtime_remaining
        alias: Set BedJet to run for 2 hours
    - conditions:
      - alias: Ambient Temperature is less than or equal to 65
        condition: template
        value_template: '{{states(''sensor.bedjet_12fa_ambient_temperature'') | int
          <= 65}}'
      sequence:
      - alias: Turn on BedJet Heat
        action: climate.set_hvac_mode
        metadata: {}
        data:
          hvac_mode: heat
        target:
          entity_id: climate.bedjet_12fa
      - alias: Set BedJet to run for 1 hours
        action: number.set_value
        metadata: {}
        data:
          value: '60'
        target:
